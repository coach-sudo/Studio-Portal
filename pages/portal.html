<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Workspace</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #17211d;
      --muted: #66736b;
      --line: #dbe1d8;
      --paper: #ffffff;
      --soft: #f5f6f2;
      --gold: #b88a2f;
      --danger: #9b3146;
      --good: #4f7d60;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "DM Sans", system-ui, sans-serif;
      color: var(--ink);
      background: var(--soft);
    }
    button, input, textarea, select {
      font: inherit;
    }
    .shell {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 20px 64px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }
    .brand {
      font-family: "Playfair Display", Georgia, serif;
      font-size: 30px;
      line-height: 1;
    }
    .panel {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 22px;
    }
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 18px;
      align-items: stretch;
    }
    h1, h2, h3 {
      margin: 0;
      font-family: "Playfair Display", Georgia, serif;
    }
    h1 { font-size: clamp(34px, 5vw, 62px); line-height: 1; }
    h2 { font-size: 28px; }
    h3 { font-size: 21px; }
    p { line-height: 1.5; }
    .muted { color: var(--muted); }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }
    .two {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, 0.9fr);
      gap: 14px;
      margin-top: 14px;
    }
    .action-card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 18px;
    }
    .action-card.primary {
      border-color: rgba(184,138,47,.45);
      background: #fffaf0;
    }
    .workspace-hero {
      background:
        radial-gradient(circle at 18% 0%, rgba(184,138,47,.16), transparent 32%),
        linear-gradient(135deg, #ffffff 0%, #f9f3e6 100%);
    }
    .portal-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 20px;
    }
    .portal-nav button {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.82);
      border-radius: 999px;
      min-height: 40px;
      padding: 0 14px;
      color: var(--muted);
      cursor: pointer;
      font-weight: 700;
    }
    .portal-nav button.active {
      color: var(--ink);
      border-color: var(--gold);
      background: #fbf5e4;
    }
    .desk-grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 14px;
      margin-top: 14px;
    }
    .desk-card {
      grid-column: span 4;
      min-width: 0;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
    }
    .desk-card.wide { grid-column: span 8; }
    .desk-card.full { grid-column: 1 / -1; }
    .desk-card.soft { background: #fbfaf5; }
    .desk-card.gold {
      border-color: rgba(184,138,47,.35);
      background: #fff8e8;
    }
    .card-label {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 700;
    }
    .card-title {
      margin: 0;
      font-family: "Playfair Display", Georgia, serif;
      font-size: 24px;
      line-height: 1.1;
    }
    .card-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }
    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .mini-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }
    .mini-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255,255,255,.72);
      padding: 11px 12px;
    }
    .empty-state {
      border: 1px dashed var(--line);
      border-radius: 12px;
      background: rgba(255,255,255,.55);
      padding: 16px;
      color: var(--muted);
    }
    .lesson-timeline {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }
    .lesson-card {
      display: grid;
      grid-template-columns: 112px minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      width: 100%;
      text-align: left;
      cursor: pointer;
    }
    .date-tile {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: white;
      padding: 10px;
      text-align: center;
      font-weight: 700;
    }
    .date-tile span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .material-section {
      display: grid;
      gap: 12px;
    }
    .contact-card {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 14px;
    }
    .kpi {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--soft);
      padding: 12px 14px;
    }
    .quick-actions {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      margin-top: 18px;
    }
    .progress {
      height: 9px;
      border-radius: 999px;
      overflow: hidden;
      background: #e9ede6;
      margin-top: 10px;
    }
    .progress span {
      display: block;
      height: 100%;
      background: linear-gradient(135deg, #f0d489, var(--gold));
    }
    .button {
      border: 1px solid var(--ink);
      border-radius: 8px;
      min-height: 42px;
      padding: 0 14px;
      background: var(--ink);
      color: white;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .button.secondary {
      background: white;
      color: var(--ink);
    }
    .button.gold {
      background: linear-gradient(135deg, #f0d489, var(--gold));
      color: var(--ink);
      border-color: transparent;
    }
    .form {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }
    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
    }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
      padding: 12px;
      color: var(--ink);
      text-transform: none;
      letter-spacing: 0;
      font-weight: 400;
    }
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 18px 0 14px;
    }
    .tabs button {
      border: 1px solid var(--line);
      background: white;
      border-radius: 999px;
      padding: 10px 14px;
      color: var(--muted);
      cursor: pointer;
    }
    .tabs button.active {
      color: var(--ink);
      border-color: var(--gold);
      background: #fbf5e4;
    }
    .list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }
    .row {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--soft);
      padding: 14px;
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .media-card {
      display: grid;
      grid-template-columns: 140px minmax(0, 1fr);
      gap: 14px;
      align-items: stretch;
    }
    .preview {
      min-height: 110px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: white;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-weight: 700;
      text-align: center;
      padding: 10px;
    }
    .preview img, .preview video, .preview iframe {
      width: 100%;
      height: 100%;
      min-height: 110px;
      object-fit: cover;
      border: 0;
      display: block;
    }
    .upload-drop {
      border: 1px dashed var(--gold);
      background: #fffaf0;
      border-radius: 12px;
      padding: 16px;
    }
    .upload-drop input { background: white; }
    .help-text {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      text-transform: none;
      letter-spacing: 0;
      font-weight: 500;
    }
    .status {
      display: inline-flex;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      background: #ebe8df;
      color: var(--muted);
    }
    .status.good { background: rgba(79,125,96,.12); color: var(--good); }
    .status.warn { background: rgba(184,138,47,.14); color: var(--gold); }
    .status.danger { background: rgba(155,49,70,.10); color: var(--danger); }
    .message {
      margin: 14px 0;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: white;
    }
    .message.error {
      color: var(--danger);
      border-color: rgba(155,49,70,.25);
      background: rgba(155,49,70,.05);
    }
    .message.loading {
      border-color: rgba(79,125,96,.25);
      background: rgba(79,125,96,.07);
    }
    .message.loading::before {
      content: "";
      width: 8px;
      height: 8px;
      display: inline-block;
      margin-right: 8px;
      border-radius: 999px;
      background: var(--good);
      animation: pulse 0.8s ease-in-out infinite alternate;
    }
    @keyframes pulse {
      from { opacity: 0.35; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    .join-now {
      position: sticky;
      top: 0;
      z-index: 30;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
      border: 1px solid rgba(184,138,47,.35);
      background: #fff7df;
      box-shadow: 0 10px 28px rgba(23,33,29,.08);
    }
    .rich-text {
      color: var(--ink);
      line-height: 1.6;
    }
    .rich-text p,
    .rich-text div { margin: 0 0 0.8rem; }
    .rich-text ul,
    .rich-text ol { margin: 0.5rem 0 0.8rem 1.25rem; padding-left: 1rem; }
    .rich-text strong,
    .rich-text b { font-weight: 700; }
    .rich-text em,
    .rich-text i { font-style: italic; }
    .rich-text u { text-decoration: underline; }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 40;
      background: rgba(23,33,29,.54);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }
    .modal {
      width: min(920px, 100%);
      max-height: 90vh;
      overflow: auto;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 22px;
    }
    .hidden { display: none !important; }
    @media (max-width: 860px) {
      .hero, .two, .grid, .quick-actions, .desk-grid, .contact-card { grid-template-columns: 1fr; }
      .desk-card,
      .desk-card.wide,
      .desk-card.full { grid-column: 1; }
      .lesson-card { grid-template-columns: 1fr; }
      .media-card { grid-template-columns: 1fr; }
      .join-now { position: static; flex-direction: column; align-items: stretch; }
      .tabs {
        position: sticky;
        top: 0;
        z-index: 10;
        background: rgba(245,246,242,.96);
        padding: 8px 0;
      }
      .topbar { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <div class="brand" id="portal-brand">Student Workspace</div>
      <button id="sign-out" class="button secondary hidden">Sign Out</button>
    </div>
    <div id="message"></div>
    <section id="auth-panel" class="panel"></section>
    <section id="workspace" class="hidden"></section>
  </main>

  <script>
    var state = { identity: null, data: null, tab: "overview" };

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, function (char) {
        return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#039;" })[char];
      });
    }
    function setMessage(message, error, loading) {
      document.getElementById("message").innerHTML = message ? '<div class="message ' + (loading ? "loading" : error ? "error" : "") + '">' + escapeHtml(message) + '</div>' : "";
    }
    async function api(action, options) {
      options = options || {};
      var method = options.method || "GET";
      var response = await fetch(method === "GET" ? "/api/student-auth?action=" + encodeURIComponent(action) : "/api/student-auth", {
        method: method,
        credentials: "include",
        headers: { "Content-Type": "application/json", Accept: "application/json" },
        body: method === "GET" ? undefined : JSON.stringify(Object.assign({ action: action }, options.body || {}))
      });
      var payload = await response.json().catch(function () { return {}; });
      if (!response.ok || payload.ok === false) throw new Error(payload.error || "Request failed.");
      return payload;
    }
    function portalSettings() {
      return state.data && state.data.settings ? state.data.settings : {};
    }
    function coachPhone() { return portalSettings().coach_contact_phone || "9292160175"; }
    function coachEmail() { return portalSettings().coach_contact_email || "coach@d-a-j.com"; }
    function studentPortalLabel() { return portalSettings().student_portal_label || "Student Workspace"; }
    function studentWelcomeMessage() { return portalSettings().student_welcome_message || "Lessons, homework, package renewal, reader requests, and actor page updates."; }
    function shouldShowStudentAction(key) {
      var settings = portalSettings();
      if (key === "contact") return settings.student_show_contact_buttons !== false;
      if (key === "booking") return settings.student_show_booking_button !== false;
      if (key === "drive") return settings.student_show_drive_folder !== false;
      return true;
    }
    function getSetupToken() {
      return new URLSearchParams(window.location.search).get("setup") || "";
    }
    function getResetToken() {
      return new URLSearchParams(window.location.search).get("reset") || "";
    }
    function renderAuth() {
      var token = getSetupToken();
      var resetToken = getResetToken();
      document.getElementById("portal-brand").textContent = "Student Workspace";
      document.getElementById("workspace").classList.add("hidden");
      document.getElementById("sign-out").classList.add("hidden");
      document.getElementById("auth-panel").classList.remove("hidden");
      document.getElementById("auth-panel").innerHTML = token || resetToken ? `
        <h1>${resetToken ? "Reset Password" : "Create Your Account"}</h1>
        <p class="muted">${resetToken ? "Choose a new password for your private student workspace." : "Set a password for your private student workspace."}</p>
        <form class="form" id="setup-form">
          <label>Password<input name="password" type="password" autocomplete="new-password" minlength="8" required /></label>
          <button class="button gold" type="submit">${resetToken ? "Save New Password" : "Create Account"}</button>
        </form>
      ` : `
        <h1>Sign In</h1>
        <p class="muted">Use the email on file and your student account password.</p>
        <form class="form" id="login-form">
          <label>Email<input name="email" type="email" autocomplete="email" required /></label>
          <label>Password<input name="password" type="password" autocomplete="current-password" required /></label>
          <button class="button gold" type="submit">Sign In</button>
        </form>
        <form class="form" id="reset-request-form">
          <h3>Reset Password</h3>
          <p class="muted">Enter your email and your coach will send a reset link.</p>
          <label>Email<input name="email" type="email" autocomplete="email" required /></label>
          <button class="button secondary" type="submit">Request Reset Link</button>
        </form>
        <p class="muted">Need first-time access? Ask your coach to invite your student account.</p>
      `;
      var setupForm = document.getElementById("setup-form");
      if (setupForm) setupForm.onsubmit = submitSetup;
      var loginForm = document.getElementById("login-form");
      if (loginForm) loginForm.onsubmit = submitLogin;
      var resetRequestForm = document.getElementById("reset-request-form");
      if (resetRequestForm) resetRequestForm.onsubmit = submitResetRequest;
    }
    async function submitSetup(event) {
      event.preventDefault();
      try {
        var resetToken = getResetToken();
        setMessage(resetToken ? "Saving your new password..." : "Creating your account...", false, true);
        await api(resetToken ? "complete_reset" : "complete_invite", {
          method: "POST",
          body: {
            token: resetToken || getSetupToken(),
            password: event.currentTarget.elements.password.value
          }
        });
        setMessage(resetToken ? "Password reset. Sign in with your email and new password." : "Account created. Sign in with your email and new password.");
        history.replaceState(null, "", "/portal");
        renderAuth();
      } catch (error) {
        setMessage(error.message, true);
      }
    }
    async function submitLogin(event) {
      event.preventDefault();
      try {
        setMessage("Signing you in...", false, true);
        await api("login", { method: "POST", body: { email: event.currentTarget.elements.email.value, password: event.currentTarget.elements.password.value } });
        await loadSession();
      } catch (error) {
        setMessage(error.message, true);
      }
    }
    async function submitResetRequest(event) {
      event.preventDefault();
      try {
        setMessage("Requesting reset link...", false, true);
        await api("request_reset", { method: "POST", body: { email: event.currentTarget.elements.email.value } });
        setMessage("If that email has an active account, your coach can now send a reset link.");
      } catch (error) {
        setMessage(error.message, true);
      }
    }
    async function signOut() {
      await api("logout", { method: "POST", body: {} }).catch(function () {});
      state = { identity: null, data: null, tab: "overview" };
      renderAuth();
    }
    function formatDate(value) {
      var date = value ? new Date(value) : null;
      return date && !Number.isNaN(date.getTime()) ? date.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" }) : "";
    }
    function publicSlug(data) {
      return data.publicProfile && data.publicProfile.slug ? data.publicProfile.slug : "";
    }
    function publicUrl(data) {
      var slug = publicSlug(data);
      return slug ? "/actors/" + encodeURIComponent(slug) : "";
    }
    function bookingUrl(data) {
      return data.settings && data.settings.booking_url ? data.settings.booking_url : "https://coach.as.me";
    }
    function activePackage(data) {
      return (data.packages || []).find(function (pkg) { return String(pkg.status || "").toLowerCase() !== "archived"; }) || null;
    }
    function packageProgress(pkg) {
      if (!pkg) return 0;
      var total = Number(pkg.sessions_total || 0);
      var remaining = Number(pkg.sessions_remaining || 0);
      if (!total) return 0;
      return Math.max(0, Math.min(100, Math.round((remaining / total) * 100)));
    }
    function money(value) {
      var number = Number(value || 0);
      return Number.isFinite(number) ? number.toLocaleString(undefined, { style: "currency", currency: "USD" }) : "$0.00";
    }
    function reviewStatusLabel(file) {
      return String(file.public_page_status || "NOT_PUBLIC").replace(/_/g, " ").toLowerCase();
    }
    function materialUrl(file) {
      return String(file && (file.file_url || file.external_url) || "").trim();
    }
    function embedUrl(url) {
      var raw = String(url || "").trim();
      if (!raw) return "";
      try {
        var parsed = new URL(raw);
        if (/drive\.google\.com$/i.test(parsed.hostname)) {
          var match = parsed.pathname.match(/\/file\/d\/([^/]+)/i);
          var fileId = match ? match[1] : parsed.searchParams.get("id");
          if (fileId) return "https://drive.google.com/file/d/" + encodeURIComponent(fileId) + "/preview";
        }
      } catch (error) {
        return raw;
      }
      return raw;
    }
    function videoEmbedUrl(url) {
      var raw = String(url || "").trim();
      if (!raw) return "";
      try {
        var parsed = new URL(raw);
        var host = parsed.hostname.replace(/^www\./i, "").toLowerCase();
        if (host === "youtu.be") {
          var shortId = parsed.pathname.split("/").filter(Boolean)[0];
          return shortId ? "https://www.youtube.com/embed/" + encodeURIComponent(shortId) : "";
        }
        if (host === "youtube.com" || host === "m.youtube.com") {
          var id = parsed.searchParams.get("v");
          if (!id) {
            var match = parsed.pathname.match(/\/(?:shorts|embed)\/([^/]+)/i);
            id = match && match[1];
          }
          return id ? "https://www.youtube.com/embed/" + encodeURIComponent(id) : "";
        }
        if (host === "vimeo.com" || host === "player.vimeo.com") {
          var vimeoId = parsed.pathname.split("/").filter(Boolean).find(function (part) { return /^\d+$/.test(part); });
          return vimeoId ? "https://player.vimeo.com/video/" + encodeURIComponent(vimeoId) : "";
        }
      } catch (error) {
        return "";
      }
      return "";
    }
    function materialType(file) {
      var blob = [file && file.category, file && file.material_kind, file && file.mime_type, file && file.title, materialUrl(file)].join(" ");
      if (/image|headshot|photo|jpeg|jpg|png|webp|gif/i.test(blob)) return "image";
      if (/video|reel|self tape|mp4|mov|webm|youtube|youtu\.be|vimeo/i.test(blob)) return "video";
      if (/audio|voice|mp3|wav|m4a|aac|ogg/i.test(blob)) return "audio";
      if (/pdf|resume|document/i.test(blob)) return "pdf";
      return "file";
    }
    function materialPreview(file) {
      var url = materialUrl(file);
      var title = escapeHtml(file && (file.title || file.file_name) || "Material");
      var type = materialType(file);
      if (!url) return '<div class="preview">No file</div>';
      if (type === "image") return '<a class="preview" href="' + escapeHtml(url) + '" target="_blank" rel="noopener"><img alt="' + title + '" src="' + escapeHtml(url) + '" loading="lazy" /></a>';

        if (!allowedTags.includes(node.tagName)) {
          node.replaceWith(document.createTextNode(node.textContent || ""));

        Array.prototype.slice.call(node.attributes).forEach(function (attribute) {

          if ((name === "href" || name === "src") && /^javascript:/i.test(value)) node.removeAttribute(attribute.name);
          if (node.tagName === "A" && name === "href") {

          <label>Title<input name="title" value="${escapeHtml(script.title || "")}" /></label>
          <label>Script Link<input name="script_url" type="url" value="${escapeHtml(script.external_url || "")}" /></label>
          <label>Text<textarea name="script_text" rows="10">${escapeHtml((function () { try { return JSON.parse(script.notes || "{}").script_text || ""; } catch (error) { return ""; } })())}</textarea></label>
          <button class="button gold" type="submit">Save Script</button>
        </form>
        <aside class="panel"><p class="card-label">Active Desk</p><h2>Status</h2><p class="muted">${script.title ? "Active script is ready." : "Add a script when you want notes in one place."}</p><div class="mini-list">${active.length ? active.map(function (file) { return '<div class="mini-item"><strong>' + escapeHtml(file.title || file.file_name || "Material") + '</strong><p class="muted">' + escapeHtml(file.category || "Material") + '</p></div>'; }).join("") : '<div class="empty-state">No active material cards yet.</div>'}</div><h3 style="margin-top:18px">Practice</h3><div class="mini-list">${homework.length ? homework.map(function (item) { return '<div class="mini-item"><strong>' + escapeHtml(item.title || "Homework") + '</strong><p class="muted">' + escapeHtml(item.details || "") + '</p></div>'; }).join("") : '<div class="empty-state">No open practice items.</div>'}</div>${requests.length ? '<div class="card-actions"><button class="button secondary" onclick="setTab(\'reader\')">' + requests.length + ' Reader Request' + (requests.length === 1 ? '' : 's') + '</button></div>' : ""}</aside>
      </section>`;
    }
    function renderPaymentsTab(data) {
      var pkg = activePackage(data);
      var progress = packageProgress(pkg);
      var billing = String(data.student && data.student.billing_model || "").toUpperCase();
      var statusText = billing === "PACKAGE"
        ? "Package sessions and recent visible payments."
        : billing === "CUSTOM"
          ? "You have a custom arrangement with Darius."
          : "Pay-as-you-go students do not need package session math here.";
      return `<section class="two">
        <div class="panel">
          <p class="card-label">Package</p>
          <h2>Package</h2>
          <p class="muted">${escapeHtml(statusText)}</p>
          ${pkg ? '<div class="kpi"><strong>' + escapeHtml(pkg.package_name || "Package") + '</strong><span class="status ' + (Number(pkg.sessions_remaining || 0) <= 1 ? "warn" : "good") + '">' + escapeHtml(pkg.sessions_remaining || "0") + ' left</span></div><div class="progress"><span style="width:' + progress + '%"></span></div><p class="muted">' + escapeHtml(pkg.expires_at ? "Expires " + formatDate(pkg.expires_at) : money(pkg.package_price) + " package price") + '</p><button class="button gold" onclick="startPackageRenewal()">Renew Package</button>' : '<div class="empty-state">No package is visible right now.</div>'}
        </div>
        <aside class="panel"><p class="card-label">Visible History</p><h2>Payments</h2><div class="list">${(data.payments || []).length ? data.payments.map(function (payment) {
          return '<div class="row"><strong>' + money(payment.amount) + '</strong><p class="muted">' + escapeHtml(payment.payment_type || "Payment") + ' - ' + escapeHtml(formatDate(payment.payment_date || payment.created_at)) + '</p></div>';
        }).join("") : '<div class="empty-state">No visible payment history yet.</div>'}</div></aside>
      </section>`;
    }
    function renderReaderTab(data) {
      var requests = data.readerRequests || [];
      return `<section class="two">
        <form class="panel form" id="reader-form">
          <h2>Request Reader</h2>
          <label>Filming Date<input name="filming_date" type="date" required /></label>
          <label>Filming Time<input name="filming_time" type="time" required /></label>
          <label>Expected Duration<select name="duration_minutes"><option value="30">30 minutes</option><option value="45">45 minutes</option><option value="60">60 minutes</option><option value="90">90 minutes</option><option value="120">2 hours</option></select></label>
          <label>Meet By<select name="meeting_method"><option value="ZOOM">Zoom</option><option value="GOOGLE_MEET">Google Meet</option><option value="TEAMS">Microsoft Teams</option><option value="PHONE">Phone Call</option><option value="WHATSAPP">WhatsApp</option><option value="SOCIAL_MEDIA">Social Media</option><option value="IN_PERSON">In Person</option></select></label>
          <label>Meeting Details<input name="meeting_details" placeholder="Link, phone, handle, address, or instructions" /></label>
          <label>Sides Link<input name="sides_url" type="url" /></label>
          <label>Instructions Link<input name="instructions_url" type="url" /></label>
          <label class="upload-drop">Upload Sides/Instructions<input name="reader_upload" type="file" accept="application/pdf,image/*,video/*,.doc,.docx,.txt" /><span class="help-text">PDFs, images, and short videos can be uploaded directly. Use links for larger files.</span></label>
          <label>Notes<textarea name="notes" rows="4"></textarea></label>
          <button class="button gold" type="submit">Send Request</button>
        </form>
        <aside class="panel"><h2>Requests</h2><div class="list">${requests.length ? requests.map(function (request) {
          return '<div class="row"><strong>' + escapeHtml(formatDate(request.filming_date) || request.filming_date) + ' ' + escapeHtml(request.filming_time || "") + '</strong><p><span class="status warn">' + escapeHtml(String(request.status || "SUBMITTED").toLowerCase()) + '</span></p><p class="muted">' + escapeHtml(request.meeting_method || "") + '</p></div>';
        }).join("") : '<div class="row">No reader requests yet.</div>'}</div></aside>
      </section>`;
    }
    function renderContactTab(data) {
      return `<section class="panel">
        <p class="card-label">Contact / Support</p>
        <h2>Contact Darius</h2>
        <p class="muted">Questions, prep notes, scheduling, or something you want Darius to see before the next lesson.</p>
        <div class="contact-card">
          ${shouldShowStudentAction("contact") ? '<a class="action-card" href="mailto:' + escapeHtml(coachEmail()) + '"><h3>Email</h3><p class="muted">' + escapeHtml(coachEmail()) + '</p></a>' : ""}
          ${shouldShowStudentAction("contact") ? '<a class="action-card" href="sms:' + escapeHtml(coachPhone()) + '"><h3>Text</h3><p class="muted">' + escapeHtml(coachPhone()) + '</p></a>' : ""}
          ${shouldShowStudentAction("booking") ? '<a class="action-card" href="' + escapeHtml(bookingUrl(data)) + '" target="_blank" rel="noopener"><h3>Book</h3><p class="muted">Open the booking page.</p></a>' : ""}
        </div>
        ${shouldShowStudentAction("drive") && data.student && data.student.drive_folder_url ? '<div class="card-actions"><a class="button secondary" href="' + escapeHtml(data.student.drive_folder_url) + '" target="_blank" rel="noopener">Open Studio Drive Folder</a></div>' : ""}
      </section>`;
    }
    function setTab(tab) {
      state.tab = tab;
      renderWorkspace();
      bindForms();
    }
    async function copyPublicUrl() {
      var url = window.location.origin + publicUrl(state.data || {});
      if (navigator.clipboard && navigator.clipboard.writeText) await navigator.clipboard.writeText(url);
      setMessage("Public page link copied.");
    }
    function updateHomework(homeworkId, completed) {
      submitStudentAction("update_homework", { homework_id: homeworkId, completed: completed }, "Homework updated.", "homework");
    }
    function requestHomeworkHelp(homeworkId) {
      submitStudentAction("update_homework", { homework_id: homeworkId, reminder_requested: true }, "Help request sent.", "homework");
    }
    function lessonNote(data, lessonId) {
      return (data.notes || []).find(function (note) { return note.lesson_id === lessonId; }) || null;
    }
    function lessonHomework(data, lessonId) {
      return (data.homework || []).filter(function (item) { return item.lesson_id === lessonId; });
    }
    function lessonMaterials(data, lessonId) {
      return (data.materials || []).filter(function (file) { return file.lesson_id === lessonId; });
    }
    function lessonComments(data, lessonId) {
      return (data.lessonComments || []).filter(function (comment) { return comment.lesson_id === lessonId; });
    }
    function openLessonModal(lessonId) {
      var data = state.data || {};
      var lesson = (data.lessons || []).find(function (row) { return row.lesson_id === lessonId; });
      if (!lesson) return;
      var note = lessonNote(data, lessonId);
      var homework = lessonHomework(data, lessonId);
      var materials = lessonMaterials(data, lessonId);
      var comments = lessonComments(data, lessonId);
      var overlay = document.createElement("div");
      overlay.className = "modal-backdrop";
      overlay.id = "lesson-modal";
      overlay.innerHTML = `
        <div class="modal">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:14px">
            <div>
              <h2>${escapeHtml(lesson.topic || lesson.lesson_type || "Lesson")}</h2>
              <p class="muted">${escapeHtml(formatDate(lesson.scheduled_start))} · ${escapeHtml(lesson.lesson_status || "Scheduled")}</p>
            </div>
            <button type="button" class="button secondary" onclick="closeLessonModal()">Close</button>
          </div>
          <div class="quick-actions" style="grid-template-columns:repeat(4,minmax(0,1fr))">
            ${lesson.join_link ? '<a class="button gold" href="' + escapeHtml(lesson.join_link) + '" target="_blank" rel="noopener">Join</a>' : ""}
            ${shouldShowStudentAction("contact") ? `<a class="button secondary" href="sms:${coachPhone()}">Text Coach</a><a class="button secondary" href="mailto:${coachEmail()}">Email Coach</a>` : ""}
            ${shouldShowStudentAction("booking") ? `<a class="button secondary" href="${escapeHtml(bookingUrl(data))}" target="_blank" rel="noopener">Book</a>` : ""}
          </div>
          <section class="two">
            <div class="panel">
              <h3>Notes</h3>
              ${note ? '<div class="row"><strong>' + escapeHtml(note.title || "Lesson Notes") + '</strong><div class="rich-text">' + sanitizeRichText(note.body || "") + '</div></div>' : '<div class="row">No published note for this lesson yet.</div>'}
              <h3 style="margin-top:18px">Homework</h3>
              <div class="list">${homework.length ? homework.map(function (item) {
                return '<div class="row"><strong>' + escapeHtml(item.title || "Homework") + '</strong><p class="muted">' + escapeHtml(item.details || "") + '</p></div>';
              }).join("") : '<div class="row">No homework attached.</div>'}</div>
              <h3 style="margin-top:18px">Materials</h3>
              <div class="list">${materials.length ? materials.map(function (file) {
                return materialCard(file);
              }).join("") : '<div class="row">No materials attached.</div>'}</div>
            </div>
            <aside class="panel">
              <h3>Comments for Coach</h3>
              <div class="list">${comments.length ? comments.map(function (comment) {
                return '<div class="row"><strong>' + escapeHtml(comment.author_role || "Student") + '</strong><p class="muted">' + escapeHtml(comment.body || "") + '</p><p class="muted">' + escapeHtml(formatDate(comment.created_at)) + '</p></div>';
              }).join("") : '<div class="row">No comments yet.</div>'}</div>
              <form class="form" id="lesson-comment-form" style="margin-top:14px">
                <label>Comment<textarea name="comment" rows="4" required></textarea></label>
                <button class="button gold" type="submit">Send Comment</button>
              </form>
            </aside>
          </section>
        </div>
      `;
      document.body.appendChild(overlay);
      overlay.onclick = function (event) { if (event.target === overlay) closeLessonModal(); };
      var form = document.getElementById("lesson-comment-form");
      if (form) form.onsubmit = function (event) {
        event.preventDefault();
        submitStudentAction("add_lesson_comment", { lesson_id: lessonId, comment: form.elements.comment.value }, "Comment sent.", "lessons")
          .then(function () { closeLessonModal(); });
      };
    }
    function closeLessonModal() {
      var modal = document.getElementById("lesson-modal");
      if (modal) modal.remove();
    }
    async function submitStudentAction(action, body, message, tab) {
      return api(action, { method: "POST", body: body })
        .then(function (payload) {
          state.data = payload.data;
          setMessage(message || "Saved.");
          if (tab) state.tab = tab;
          renderWorkspace();
          bindForms();
        })
        .catch(function (error) { setMessage(error.message, true); });
    }
    async function startPackageRenewal() {
      try {
        var pkg = activePackage(state.data || {});
        if (!pkg) throw new Error("No renewable package is visible right now.");
        var response = await fetch("/api/stripe-checkout", {
          method: "POST",
          credentials: "include",
          headers: { "Content-Type": "application/json", Accept: "application/json" },
          body: JSON.stringify({ package_id: pkg.package_id })
        });
        var payload = await response.json().catch(function () { return {}; });
        if (!response.ok || payload.ok === false) throw new Error(payload.error || "Unable to start checkout.");
        window.location.href = payload.checkout.url;
      } catch (error) {
        setMessage(error.message, true);
      }
    }
    function readUploadFile(file) {
      return new Promise(function (resolve, reject) {
        if (!file) return resolve(null);
        if (file.size > 4.5 * 1024 * 1024) return reject(new Error("Direct uploads must be 4.5 MB or smaller. Use a share link for larger videos or PDFs."));
        var reader = new FileReader();
        reader.onload = function () {
          resolve({ name: file.name, mime_type: file.type, data_url: String(reader.result || "") });
        };
        reader.onerror = function () { reject(new Error("Unable to read upload.")); };
        reader.readAsDataURL(file);
      });
    }
    function bindForms() {
      var profileForm = document.getElementById("profile-form");
      if (profileForm) profileForm.onsubmit = async function (event) {
        event.preventDefault();
        var form = event.currentTarget;
        await api("update_public_profile", { method: "POST", body: {
          display_name: form.elements.display_name.value,
          bio: form.elements.bio.value,
          location: form.elements.location.value,
          height: form.elements.height.value,
          eye_color: form.elements.eye_color.value,
          hair_color: form.elements.hair_color.value,
          status: form.elements.go_live && form.elements.go_live.checked ? "Active" : "Draft"
        }}).then(function (payload) { state.data = payload.data; setMessage("Profile saved."); renderWorkspace(); bindForms(); }).catch(function (error) { setMessage(error.message, true); });
      };
      var submissionForm = document.getElementById("submission-form");
      if (submissionForm) submissionForm.onsubmit = async function (event) {
        event.preventDefault();
        var form = event.currentTarget;
        try {
          var upload = await readUploadFile(form.elements.material_upload.files[0]);
          if (!upload && !form.elements.external_url.value.trim()) throw new Error("Upload a file or paste a share link.");
        await api("submit_public_material", { method: "POST", body: {
          title: form.elements.title.value,
          category: form.elements.category.value,
          external_url: form.elements.external_url.value,
          file_name: upload ? upload.name : "",
          file_data_url: upload ? upload.data_url : "",
          mime_type: upload ? upload.mime_type : "",
          notes: form.elements.notes.value,
          source_type: upload ? "UPLOAD" : "LINK"
        }}).then(function (payload) { state.data = payload.data; setMessage("Material submitted for review."); state.tab = "submissions"; renderWorkspace(); bindForms(); }).catch(function (error) { setMessage(error.message, true); });
        } catch (error) {
          setMessage(error.message, true);
        }
      };
      var scriptForm = document.getElementById("script-form");
      if (scriptForm) scriptForm.onsubmit = async function (event) {
        event.preventDefault();
        var form = event.currentTarget;
        await submitStudentAction("save_current_script", {
          title: form.elements.title.value,
          script_url: form.elements.script_url.value,
          script_text: form.elements.script_text.value
        }, "Script saved.", "script");
      };
      var readerForm = document.getElementById("reader-form");
      if (readerForm) readerForm.onsubmit = async function (event) {
        event.preventDefault();
        var form = event.currentTarget;
        try {
          var upload = await readUploadFile(form.elements.reader_upload.files[0]);
          await submitStudentAction("request_reader", {
            filming_date: form.elements.filming_date.value,
            filming_time: form.elements.filming_time.value,
            duration_minutes: form.elements.duration_minutes.value,
            meeting_method: form.elements.meeting_method.value,
            meeting_details: form.elements.meeting_details.value,
            sides_url: form.elements.sides_url.value,
            instructions_url: form.elements.instructions_url.value,
            upload_name: upload ? upload.name : "",
            upload_data_url: upload ? upload.data_url : "",
            upload_mime_type: upload ? upload.mime_type : "",
            notes: form.elements.notes.value
          }, "Reader request sent.", "reader");
        } catch (error) {
          setMessage(error.message, true);
        }
      };
      Array.prototype.forEach.call(document.querySelectorAll("[data-homework-id]"), function (button) {
        button.onclick = function () {
          updateHomework(button.getAttribute("data-homework-id"), button.getAttribute("data-homework-complete") === "true");
        };
      });
      Array.prototype.forEach.call(document.querySelectorAll("[data-homework-help]"), function (button) {
        button.onclick = function () {
          requestHomeworkHelp(button.getAttribute("data-homework-help"));
        };
      });
      Array.prototype.forEach.call(document.querySelectorAll("[data-lesson-open]"), function (button) {
        button.onclick = function () {
          openLessonModal(button.getAttribute("data-lesson-open"));
        };
      });
    }
    async function loadSession() {
      try {
        setMessage("Loading your workspace...", false, true);
        var checkout = new URLSearchParams(window.location.search).get("checkout");
        if (checkout === "success") setMessage("Payment received. Your package renewal is being confirmed.");
        if (checkout === "cancelled") setMessage("Checkout cancelled. You can renew whenever you're ready.");
        var payload = await api("portal_data");
        state.identity = payload.identity;
        state.data = payload.data;
        setMessage("");
        renderWorkspace();
        bindForms();
      } catch (error) {
        setMessage("");
        renderAuth();
      }
    }
    document.getElementById("sign-out").onclick = signOut;
    loadSession();
  </script>
</body>
</html>
