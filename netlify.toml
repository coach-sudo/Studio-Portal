[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  included_files = ["assets/js/schema.js"]

[[redirects]]
  from = "/api/studio-sync"
  to = "/.netlify/functions/studio-sync"
  status = 200

[[redirects]]
  from = "/api/google-oauth-start"
  to = "/.netlify/functions/google-oauth-start"
  status = 200

[[redirects]]
  from = "/api/google-oauth-callback"
  to = "/.netlify/functions/google-oauth-callback"
  status = 200

[[redirects]]
  from = "/api/student-auth"
  to = "/.netlify/functions/student-auth"
  status = 200
