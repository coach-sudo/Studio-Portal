[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  included_files = ["assets/js/schema.js"]

[[redirects]]
  from = "/api/studio-sync"
  to = "/.netlify/functions/studio-sync"
  status = 200

[[redirects]]
  from = "/api/google-oauth-start"
  to = "/.netlify/functions/google-oauth-start"
  status = 200

[[redirects]]
  from = "/api/google-oauth-callback"
  to = "/.netlify/functions/google-oauth-callback"
  status = 200

[[redirects]]
  from = "/api/student-auth"
  to = "/.netlify/functions/student-auth"
  status = 200

[[redirects]]
  from = "/api/public-profile"
  to = "/.netlify/functions/public-profile"
  status = 200

[[redirects]]
  from = "/portal"
  to = "/pages/portal.html"
  status = 200

[[redirects]]
  from = "/actors/:slug"
  to = "/pages/public-profile.html?slug=:slug"
  status = 200
